name: Filmmakers Bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 🔹 Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 🔥 Cache pip (même sans requirements.txt)
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-v1
          restore-keys: |
            ${{ runner.os }}-pip-

      # 🔹 Install deps (direct)
      - name: Install deps
        run: pip install requests beautifulsoup4 deep-translator

      # 🔹 Run script
      - name: Run script
        run: python script.py
        env:
          WEBHOOK: ${{ secrets.WEBHOOK }}

      # 🔹 Save state
      - name: Save state
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add last.txt || true
          git commit -m "update last posts" || echo "no changes"
          git push
